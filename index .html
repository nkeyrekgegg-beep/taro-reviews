<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Отзывы Таро</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Montserrat;
  background: radial-gradient(circle at top,#1a1033,#05010a);
  color:white;
}

/* фон */
.stars{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(white 1px,transparent 1px);
  background-size:50px 50px;
  opacity:0.15;
  animation:move 60s linear infinite;
}
@keyframes move{
  from{transform:translateY(0)}
  to{transform:translateY(-500px)}
}

.container{
  position:relative;
  max-width:900px;
  margin:auto;
  padding:40px;
}

h1{
  text-align:center;
  font-family:Cinzel;
  color:#facc15;
}

.form{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin-top:20px;
  backdrop-filter:blur(10px);
}

input,textarea,select{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  width:100%;
  margin-top:15px;
  padding:14px;
  background:linear-gradient(45deg,#facc15,#9333ea);
  border:none;
  border-radius:12px;
  color:white;
  cursor:pointer;
}

/* отзывы */
.review{
  background:rgba(255,255,255,0.05);
  padding:15px;
  margin-top:15px;
  border-radius:15px;
}

.small{
  font-size:12px;
  opacity:0.7;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="container">

<h1>✨ Отзывы Таро ✨</h1>

<div class="form">

<input id="name" placeholder="Имя (или пусто)">
<select id="rating">
  <option>⭐⭐⭐⭐⭐</option>
  <option>⭐⭐⭐⭐</option>
  <option>⭐⭐⭐</option>
  <option>⭐⭐</option>
  <option>⭐</option>
</select>

<textarea id="text" placeholder="Ваш отзыв..."></textarea>

<label class="small">
<input type="checkbox" id="anon"> Анонимно
</label>

<label class="small">
<input type="checkbox" id="publish" checked> Показать на сайте
</label>

<!-- honeypot защита -->
<input id="website" style="display:none">

<button onclick="sendReview()">Отправить</button>

</div>

<h2>Отзывы:</h2>
<div id="list"></div>

</div>

<script>

// ==================
// TELEGRAM (вставь данные)
// ==================
const TOKEN = "PASTE_TOKEN";
const CHAT_ID = "PASTE_CHAT_ID";

// ==================
// LOAD REVIEWS
// ==================
function load(){
  let data = JSON.parse(localStorage.getItem("reviews") || "[]");
  let list = document.getElementById("list");

  list.innerHTML = "";

  data.reverse().forEach(r=>{
    if(!r.publish) return;

    list.innerHTML += `
      <div class="review">
        <b>${r.name}</b><br>
        ${r.rating}<br><br>
        ${r.text}
      </div>
    `;
  });
}

load();

// ==================
// SEND REVIEW
// ==================
function sendReview(){

  let name = document.getElementById("name").value;
  let rating = document.getElementById("rating").value;
  let text = document.getElementById("text").value;
  let anon = document.getElementById("anon").checked;
  let publish = document.getElementById("publish").checked;
  let botcheck = document.getElementById("website").value;

  // антиспам
  if(botcheck !== ""){
    alert("SPAM");
    return;
  }

  if(text.length < 5){
    alert("Слишком короткий отзыв");
    return;
  }

  if(anon || name === ""){
    name = "Анонимно";
  }

  let review = {
    name,
    rating,
    text,
    publish,
    time: Date.now()
  };

  let data = JSON.parse(localStorage.getItem("reviews") || "[]");
  data.push(review);
  localStorage.setItem("reviews", JSON.stringify(data));

  load();

  // TELEGRAM
  if(TOKEN !== "PASTE_TOKEN"){
    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        chat_id:CHAT_ID,
        text:`Новый отзыв:\n\n${name}\n${rating}\n\n${text}`})
    });
  }

  document.getElementById("text").value = "";
}

</script>

</body>
</html>
